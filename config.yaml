# s3-ocr-mineru 配置文件示例
# 将此文件复制为 config.yaml 并根据实际环境修改

# ============================================================
# S3 存储桶配置（必填）
# ============================================================

# 源 S3 桶名称：存放待处理原始文件的桶
source_bucket: "adtest2026"

# 目标 S3 桶名称：存放 OCR 识别结果（Markdown 文件）的桶
target_bucket: "adtest2026"

# ============================================================
# AWS 区域配置
# ============================================================

# AWS 区域，默认为 us-east-1
aws_region: "us-east-1"

# ============================================================
# 文件前缀配置（可选）
# ============================================================

# 源文件前缀：只处理 source_bucket 中以此前缀开头的文件
# 留空则处理桶内所有文件
# 示例："documents/" 或 "2024/reports/"
source_prefix: "ZHGW/"

# 目标文件前缀：OCR 结果上传到 target_bucket 时添加的路径前缀
# 留空则保持与源文件相同的相对路径结构
# 示例："ocr-results/" 或 "processed/"
target_prefix: "ZHGW_OCR/"

# ============================================================
# 日志配置
# ============================================================

# 日志级别：DEBUG、INFO、WARNING、ERROR
# DEBUG   - 输出所有日志，包括详细调试信息
# INFO    - 输出正常运行信息（推荐生产环境使用）
# WARNING - 只输出警告和错误
# ERROR   - 只输出错误信息
log_level: "INFO"

# ============================================================
# MinerU OCR 引擎配置
# ============================================================

# MinerU 后端模式
# pipeline - 标准流水线模式（推荐，适合大多数场景）
# vlm-transformers - 基于视觉语言模型的模式（需要额外依赖）
mineru_backend: "hybrid-auto-engine"

# OCR 识别语言
# ch  - 中文（含中英混排，推荐中文文档使用）
# en  - 英文
# arabic - 阿拉伯语
# 更多语言代码请参考 MinerU 文档
mineru_lang: "arabic"

# ============================================================
# 阿拉伯语文本方向修复配置（仅当 mineru_lang 为 arabic 时生效）
# ============================================================

# 阿拉伯语 BiDi（双向文本）修复模式
# auto   - 自动模式（推荐）：智能应用 bidi 转换，适合大多数情况
# always - 总是应用 bidi 转换：强制对所有阿拉伯语文本应用转换
# never  - 从不转换：保持 OCR 原始输出，不做任何处理
#
# 说明：
# - 阿拉伯语是从右到左（RTL）书写的语言
# - OCR 识别结果可能是逻辑顺序（存储顺序）或视觉顺序（显示顺序）
# - 如果识别结果中有些文本顺序正确，有些反了，建议使用 "auto" 模式
# - 如果所有文本都是反的，可以尝试 "always" 模式
# - 如果所有文本都是正确的，使用 "never" 模式
arabic_bidi_fix: "auto"
